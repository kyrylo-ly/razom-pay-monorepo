services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - razom-pay

  redis:
    container_name: redis
    image: redis:8.6.2-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - razom-pay

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - razom-pay

  postgres-exporter:
    container_name: postgres-exporter
    image: prometheuscommunity/postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - razom-pay
    depends_on:
      - postgres

  redis_exporter:
    container_name: redis_exporter
    image: oliver006/redis_exporter
    restart: always
    command: -redis.addr=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "9121:9121"
    networks:
      - razom-pay
    depends_on:
      - redis

  rabbitmq-exporter:
    container_name: rabbitmq-exporter
    image: kbudde/rabbitmq-exporter
    restart: always
    environment:
      RABBITMQ_URL: "http://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:15672"
    ports:
      - "9419:9419"
    networks:
      - razom-pay
    depends_on:
      - rabbitmq

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - razom-pay

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./custom_targets:/etc/prometheus/custom_targets:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - razom-pay

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.47
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - razom-pay

  loki:
    image: grafana/loki:2.9.1
    container_name: loki
    restart: unless-stopped
    user: "0"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
      - loki_wal:/wal
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    networks:
      - razom-pay

  promtail:
    image: grafana/promtail:2.9.1
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - ../.logs:/var/log/services
    command: -config.file=/etc/promtail/config.yml
    networks:
      - razom-pay

  grafana:
    container_name: grafana
    image: grafana/grafana:10.2.3
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - razom-pay

volumes:
  postgres_data:
    name: razom-pay-postgres-data
  redis_data:
    name: razom-pay-redis-data
  rabbitmq_data:
    name: razom-pay-rabbitmq-data
  grafana_data:
    name: razom-pay-grafana-data
  prometheus_data:
    name: razom-pay-prometheus-data
  loki_data:
    name: razom-pay-loki-data
  loki_wal:
    name: razom-pay-loki-wal

networks:
  razom-pay:
    external: true
