services:
    gateway-service:
        container_name: gateway-service
        image: razom-pay/gateway-service:dev
        build:
            context: ../..
            dockerfile: services/gateway/Dockerfile
        restart: always
        env_file:
            - .env.production.local
        ports:
            - '4000:4000'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
            interval: 1m
            timeout: 10s
            retries: 5
        volumes:
            - ../../.logs/gateway:/var/log/services/gateway
        extra_hosts:
            - 'auth-service:host-gateway'
        networks:
            - razom-pay

networks:
    razom-pay:
        external: true
